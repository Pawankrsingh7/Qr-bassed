{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Role Login</h1>
<p class="muted">Login with your assigned role credentials. You will be redirected to your own dashboard.</p>
{% if form.errors %}
<div class="card" style="border-left:4px solid #ef4444; margin-bottom:12px;">Invalid username or password.</div>
{% endif %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Login</button>
  <input type="hidden" name="next" value="{{ next }}">
</form>
{% endblock %}
