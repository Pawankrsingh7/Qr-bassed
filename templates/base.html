<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f6f8; color: #1f2937; }
    .container { max-width: 960px; margin: 24px auto; background: #fff; border-radius: 10px; padding: 24px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .muted { color: #6b7280; }
    .nav a { margin-right: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">Home</a>
      <a href="/kitchen/">Kitchen</a>
      <a href="/dashboard/">Dashboard</a>
      {% if request.user.is_authenticated %}
        <span class="muted">Logged in: {{ request.user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline; margin-left: 8px;">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}?next={{ request.path }}">Login</a>
      {% endif %}
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
